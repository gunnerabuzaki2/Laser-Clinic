name: laser_clinic_manager
description: A Laser Clinic Management System built with Flutter for Desktop.
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # Supabase client for Flutter
  supabase_flutter: ^2.5.6

  # State management
  flutter_riverpod: ^2.5.1

  # Date formatting
  intl: ^0.19.0

  # Icons
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
